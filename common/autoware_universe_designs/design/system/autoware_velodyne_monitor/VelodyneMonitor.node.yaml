autoware_system_design_format: 0.3.0

# node information
name: VelodyneMonitor.node

package:
  name: autoware_velodyne_monitor
  provider: autoware

launch:
  plugin: autoware::velodyne_monitor::VelodyneMonitor
  executable: autoware_velodyne_monitor_node
  node_output: screen

# interfaces
# diagnostics are advertised to /diagnostics via diagnostic_updater.
subscribers: []

publishers:
  - name: diagnostics
    message_type: diagnostic_msgs/msg/DiagnosticArray
    global: /diagnostics

# parameters
param_files:
  - name: param_file
    default: config/VLP-16.param.yaml

param_values: []

# processes
processes:
  - name: monitor
    trigger_conditions:
      - on_timer: true
    outcomes:
      - to_output: diagnostics
