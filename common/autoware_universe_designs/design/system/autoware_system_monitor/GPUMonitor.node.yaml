autoware_system_design_format: 0.3.0

# node information
name: GPUMonitor.node

package:
  name: autoware_system_monitor
  provider: autoware

launch:
  plugin: GPUMonitor
  executable: gpu_monitor
  node_output: screen

# interfaces
# diagnostics are advertised to /diagnostics via diagnostic_updater.
# the gpu monitor is built per platform (nvml / tegra / unknown).
subscribers: []

publishers:
  - name: diagnostics
    message_type: diagnostic_msgs/msg/DiagnosticArray
    global: /diagnostics
  - name: gpu_status
    message_type: tier4_external_api_msgs/msg/GpuStatus
    remap_target: ~/gpu_status

# parameters
param_files:
  - name: param_file
    default: config/gpu_monitor.param.yaml

param_values: []

# processes
processes:
  - name: monitor
    trigger_conditions:
      - on_timer: true
    outcomes:
      - to_output: diagnostics
