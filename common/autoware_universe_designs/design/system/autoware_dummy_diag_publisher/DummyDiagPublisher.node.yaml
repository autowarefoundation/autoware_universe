autoware_system_design_format: 0.3.0

# node information
name: DummyDiagPublisher.node

package:
  name: autoware_dummy_diag_publisher
  provider: autoware

launch:
  plugin: autoware::dummy_diag_publisher::DummyDiagPublisher
  executable: autoware_dummy_diag_publisher_node
  node_output: screen

# interfaces
subscribers: []

publishers:
  - name: diagnostics
    message_type: diagnostic_msgs/msg/DiagnosticArray
    global: /diagnostics

# parameters
param_files:
  - name: param_file
    default: config/dummy_diag_publisher.param.yaml

param_values: []

# processes
processes:
  - name: publish
    trigger_conditions:
      - on_timer: true
    outcomes:
      - to_output: diagnostics
