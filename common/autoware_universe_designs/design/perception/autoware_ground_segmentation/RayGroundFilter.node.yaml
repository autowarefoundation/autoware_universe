autoware_system_design_format: 0.3.0

# node information
name: RayGroundFilter.node

package:
  name: autoware_ground_segmentation
  provider: autoware

launch:
  plugin: autoware::ground_segmentation::RayGroundFilterComponent
  executable: ray_ground_filter_node
  node_output: screen

# interfaces
subscribers:
  - name: input
    message_type: sensor_msgs/msg/PointCloud2
    remap_target: input

publishers:
  - name: output
    message_type: sensor_msgs/msg/PointCloud2
    remap_target: output

# parameters
param_files:
  - name: param_file
    default: config/ray_ground_filter.param.yaml

param_values:
  - name: input_frame
    type: string
    default: base_link
  - name: output_frame
    type: string
    default: base_link

# processes
processes:
  - name: filter
    trigger_conditions:
      - on_input: input
    outcomes:
      - to_output: output
