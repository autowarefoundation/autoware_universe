# Base configuration for autoware_redundancy_switcher_interface.
# Contains parameters for subsystem_adapter, diag_adapter, and log_adapter.
# Plugin-specific parameters (switcher_plugin, UDS paths, etc.) are in the plugin package config.
/**:
  ros__parameters:
    # true: receive DrivingMode commands; false: receive CommandMode commands.
    use_driving_mode: false

    # Elapsed time [ms] without CommandModeAvailability from the peer ECU before the peer
    # is considered unavailable. (SubSystemAdapter; unused when use_driving_mode=true)
    availability_timeout_milli: 500.0

    diag:
      # A transitional switcher state that persists longer than this threshold is reported
      # as DiagStatus::ERROR. (unit: ms)
      transitional_timeout_milli: 2000.0
