/**:
  ros__parameters:
    # Euclidean clustering
    use_height: false
    tolerance: 0.65
    voxel_leaf_size: 0.15
    min_points_per_voxel: 1
    min_points_per_cluster: 10
    point_capping_voxel_threshold: 10
    max_points_per_voxel_in_large_cluster: 100
    max_voxels_per_cluster: 1000
    # Per-label clustering parameter overrides.
    # Any omitted key falls back to the global default above.
    # Tuning guide:
    #   tolerance         — merge distance between voxels; smaller = finer separation
    #   voxel_leaf_size   — down-sample resolution; smaller = more detail for compact objects
    #   min_points_per_cluster  — raw-point lower bound (post reconstruction)
    #   max_voxels_per_cluster — voxel-count split bound; clusters above this are split, not dropped
    label_cluster_params:
      pedestrian:
        tolerance: 0.3                          # tight — avoid merging adjacent pedestrians
        voxel_leaf_size: 0.1                    # finer voxels for compact bodies
        min_points_per_cluster: 3
        min_points_per_voxel: 1
        point_capping_voxel_threshold: 5
        max_points_per_voxel_in_large_cluster: 30
        max_voxels_per_cluster: 200
      bicycle:
        tolerance: 0.4
        voxel_leaf_size: 0.15
        min_points_per_cluster: 5
        min_points_per_voxel: 1
        point_capping_voxel_threshold: 5
        max_points_per_voxel_in_large_cluster: 50
        max_voxels_per_cluster: 300
      hazard:
        tolerance: 0.3
        voxel_leaf_size: 0.1
        min_points_per_cluster: 3
        min_points_per_voxel: 1
        point_capping_voxel_threshold: 5
        max_points_per_voxel_in_large_cluster: 30
        max_voxels_per_cluster: 200

    # Post-clustering merge for confusable label pairs (e.g. truck/trailer over-segmentation).
    # Groups are optional — omit this block entirely to disable the feature.
    confusable_label_groups:
      truck_trailer:
        labels: ["truck", "trailer"]
        cross_label_tolerance: 0.5   # m — true min point-to-point XY gap to merge adjacent clusters
        max_merged_length: 25.0      # m — oriented length cap for a merged object (full trailer + margin)
        max_merged_width: 3.5        # m — oriented width cap for a merged object

    # Point filtering by semantic confidence
    min_probability: 0.3

    # Semantic label selection and mapping
    # YAML declaration order is treated as the input class_id order.
    # cspell:ignore pullable
    class_names:
      drivable_surface: ignore
      other_flat_surface: ignore
      sidewalk: ignore
      manmade: ignore
      vegetation: ignore
      car: car
      bus: bus
      emergency_vehicle: car
      train: unknown
      truck: truck
      tractor_unit: trailer
      semi_trailer: trailer
      construction_vehicle: truck
      forklift: car
      kart: car
      motorcycle: motorcycle
      bicycle: bicycle
      pedestrian: pedestrian
      personal_mobility: pedestrian
      animal: animal
      pushable_pullable: pedestrian
      traffic_cone: hazard
      debris: hazard
      stroller: pedestrian
      other_stuff: ignore
      noise+ghost_point: ignore

    # Shape estimation behavior
    use_shape_estimation_corrector: false
    use_shape_estimation_filter: false
    use_boost_bbox_optimizer: false
    # 0: ALL_POLYGON, 1: LABEL_DEPEND
    shape_policy: 0
