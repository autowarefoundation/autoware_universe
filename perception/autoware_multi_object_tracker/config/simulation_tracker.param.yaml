      car:        {create: pass_through_tracker}
      truck:      {create: pass_through_tracker}
      bus:        {create: pass_through_tracker}
      trailer:    {create: pass_through_tracker}
      pedestrian: {create: pass_through_tracker}
      bicycle:    {create: pass_through_tracker}
      motorcycle: {create: pass_through_tracker}
      unknown:    {create: pass_through_tracker}
