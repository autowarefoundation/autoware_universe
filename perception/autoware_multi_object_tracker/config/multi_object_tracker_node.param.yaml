/**:
  ros__parameters:
    # default tracker node parameters
    world_frame_id: map
    ego_frame_id: base_link

    # publish-trigger
    publish_on_timer: false
    publish_rate: 10.0

    # ego pose source: "tf" (look up from TF tree) or "odometry" (interpolate from ~/input/odometry)
    ego_source: tf
    # delay compensation, least -> most:
    # "none" | "publish_delay" (detection + update->publish delay) | "odometry" (up to latest odometry) | "full" (to now)
    delay_compensation: none

    consider_odometry_uncertainty: false

    # Per-tracker-type configuration
    tracker_configs:
      polygon_tracker:
        enable_velocity_estimation: true
        enable_motion_output:
          unknown:    false
          car:        true
          truck:      true
          bus:        true
          trailer:    true
          motorcycle: true
          bicycle:    true
          pedestrian: true
          animal:     true
          hazard:     false
      static_tracker:
        convert_polygon_to_bbox: false # convert POLYGON shape to BOUNDING_BOX at publish time

    # pruning parameters: tracker-pair redundancy thresholds per label-pair class
    pruning_pedestrian_pair_min_iou: 0.1  # [ratio] 1D IoU between two pedestrians
    pruning_known_pair_min_iou: 0.1       # [ratio] 2D IoU between two known-class objects
    pruning_unknown_pair_min_giou: 0.1    # [ratio] GIoU between two unknowns; negative admits disjoint pairs
    pruning_unknown_pair_max_gap: 1.0     # [m] boundary-gap bound for disjoint unknown-unknown pairs

    # debug parameters
    publish_processing_time: false
    publish_processing_time_detail: false
    publish_tentative_objects: false
    publish_debug_markers: false
    diagnostics_warn_delay: 0.5      # [sec]
    diagnostics_error_delay: 1.0     # [sec]
    diagnostics_warn_extrapolation: 0.5      # [sec]
    diagnostics_error_extrapolation: 1.0      # [sec]
