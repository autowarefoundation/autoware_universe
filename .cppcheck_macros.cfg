<?xml version="1.0"?>
<!-- Cppcheck library file loaded by the cppcheck / cppcheck-differential workflows
     through the "library" command line option. It defines macros that cppcheck
     cannot resolve on its own (it runs without include paths), so that code using
     them is parsed instead of failing with [unknownMacro].
     The AUTOWARE_* / ALLOCATE_* values mirror the plain-rclcpp fallback expansions
     in autoware_agnocast_wrapper.hpp (autoware_core). When a new wrapper macro is
     introduced, add its fallback expansion here; the workflow files do not need to
     change. -->
<def format="2">
  <!-- Message pointer types -->
  <define name="AUTOWARE_MESSAGE_UNIQUE_PTR(MessageT)" value="std::unique_ptr&lt;MessageT&gt;"/>
  <define name="AUTOWARE_MESSAGE_SHARED_PTR(MessageT)" value="std::shared_ptr&lt;MessageT&gt;"/>
  <define name="AUTOWARE_MESSAGE_CONST_SHARED_PTR(MessageT)" value="std::shared_ptr&lt;const MessageT&gt;"/>

  <!-- Publisher / subscription / timer handle types -->
  <define name="AUTOWARE_SUBSCRIPTION_PTR(MessageT)" value="rclcpp::Subscription&lt;MessageT&gt;::SharedPtr"/>
  <define name="AUTOWARE_PUBLISHER_PTR(MessageT)" value="rclcpp::Publisher&lt;MessageT&gt;::SharedPtr"/>
  <define name="AUTOWARE_POLLING_SUBSCRIBER_PTR(MessageT)" value="autoware_utils_rclcpp::InterProcessPollingSubscriber&lt;MessageT&gt;::SharedPtr"/>
  <define name="AUTOWARE_TIMER_PTR" value="rclcpp::TimerBase::SharedPtr"/>

  <!-- Publisher / subscription creation -->
  <define name="AUTOWARE_CREATE_SUBSCRIPTION(message_type, topic, qos, callback, options)" value="this-&gt;create_subscription&lt;message_type&gt;(topic, qos, callback, options)"/>
  <define name="AUTOWARE_CREATE_PUBLISHER2(message_type, arg1, arg2)" value="this-&gt;create_publisher&lt;message_type&gt;(arg1, arg2)"/>
  <define name="AUTOWARE_CREATE_PUBLISHER3(message_type, arg1, arg2, arg3)" value="this-&gt;create_publisher&lt;message_type&gt;(arg1, arg2, arg3)"/>
  <define name="AUTOWARE_CREATE_POLLING_SUBSCRIBER(message_type, topic, qos)" value="autoware_utils_rclcpp::InterProcessPollingSubscriber&lt;message_type&gt;::create_subscription(this, topic, qos)"/>

  <!-- Entity options -->
  <define name="AUTOWARE_SUBSCRIPTION_OPTIONS" value="rclcpp::SubscriptionOptions"/>
  <define name="AUTOWARE_PUBLISHER_OPTIONS" value="rclcpp::PublisherOptions"/>

  <!-- Output message allocation -->
  <define name="ALLOCATE_OUTPUT_MESSAGE_UNIQUE(publisher)" value="std::make_unique&lt;std::remove_reference&lt;decltype(*publisher)&gt;::type::ROSMessageType&gt;()"/>
  <define name="ALLOCATE_OUTPUT_MESSAGE_SHARED(publisher)" value="std::make_shared&lt;std::remove_reference&lt;decltype(*publisher)&gt;::type::ROSMessageType&gt;()"/>

  <!-- Service / client callback data pointers -->
  <define name="AUTOWARE_SERVER_REQUEST_PTR(ServiceT)" value="std::shared_ptr&lt;const typename ServiceT::Request&gt;"/>
  <define name="AUTOWARE_SERVER_RESPONSE_PTR(ServiceT)" value="std::shared_ptr&lt;typename ServiceT::Response&gt;"/>
  <define name="AUTOWARE_CLIENT_REQUEST_PTR(ServiceT)" value="std::shared_ptr&lt;typename ServiceT::Request&gt;"/>
  <define name="AUTOWARE_CLIENT_RESPONSE_PTR(ServiceT)" value="std::shared_ptr&lt;const typename ServiceT::Response&gt;"/>

  <!-- Service / client handle and future types -->
  <define name="AUTOWARE_SERVICE_PTR(ServiceT)" value="rclcpp::Service&lt;ServiceT&gt;::SharedPtr"/>
  <define name="AUTOWARE_CLIENT_PTR(ServiceT)" value="rclcpp::Client&lt;ServiceT&gt;::SharedPtr"/>
  <define name="AUTOWARE_CLIENT_FUTURE(ServiceT)" value="rclcpp::Client&lt;ServiceT&gt;::Future"/>
  <define name="AUTOWARE_CLIENT_SHARED_FUTURE(ServiceT)" value="rclcpp::Client&lt;ServiceT&gt;::SharedFuture"/>
  <define name="AUTOWARE_CLIENT_FUTURE_AND_REQUEST_ID(ServiceT)" value="rclcpp::Client&lt;ServiceT&gt;::FutureAndRequestId"/>
  <define name="AUTOWARE_CLIENT_SHARED_FUTURE_AND_REQUEST_ID(ServiceT)" value="rclcpp::Client&lt;ServiceT&gt;::SharedFutureAndRequestId"/>

  <!-- Service / client creation -->
  <define name="AUTOWARE_CREATE_CLIENT1(service_type, service_name)" value="this-&gt;create_client&lt;service_type&gt;(service_name)"/>
  <define name="AUTOWARE_CREATE_CLIENT2(service_type, service_name, qos)" value="this-&gt;create_client&lt;service_type&gt;(service_name, qos)"/>
  <define name="AUTOWARE_CREATE_CLIENT3(service_type, service_name, qos, group)" value="this-&gt;create_client&lt;service_type&gt;(service_name, qos, group)"/>
  <define name="AUTOWARE_CREATE_SERVICE2(service_type, service_name, callback)" value="this-&gt;create_service&lt;service_type&gt;(service_name, callback)"/>
  <define name="AUTOWARE_CREATE_SERVICE3(service_type, service_name, callback, qos)" value="this-&gt;create_service&lt;service_type&gt;(service_name, callback, qos)"/>
  <define name="AUTOWARE_CREATE_SERVICE4(service_type, service_name, callback, qos, group)" value="this-&gt;create_service&lt;service_type&gt;(service_name, callback, qos, group)"/>
</def>
