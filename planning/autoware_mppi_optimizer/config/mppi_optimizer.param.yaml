/**:
  ros__parameters:
    # MPPI sampling parameters
    num_samples: 1000
    num_iterations: 1
    time_horizon_s: 3.0
    time_step_s: 0.1

    # Control limits
    max_steering_angle_rad: 0.6
    max_acceleration_mps2: 2.0

    # Cost coefficients (FirstOrderDubinsBicycleCostParams defaults; two_lane_double_park example)
    track_coeff: 1000.0
    speed_coeff: 500.0
    crash_coeff: 100000.0
    lateral_acceleration_coeff: 300.0
    lateral_jerk_coeff: 300.0
    longitudinal_jerk_coeff: 10.0
    accel_cmd_coeff: 0.0
    steer_cmd_coeff: 0.0
    goal_pos_coeff: 2000.0
    goal_speed_coeff: 0.0
    goal_yaw_coeff: 0.0
    goal_terminal_scale: 10.0
    obstacle_collision_margin: 0.2
