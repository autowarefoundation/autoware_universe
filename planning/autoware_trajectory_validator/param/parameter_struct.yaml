validator:
  filter_names:
    type: string_array
    default_value: [""]
    description: metrics.
    read_only: true

  shadow_mode_filter_names:
    type: string_array
    default_value: [""]
    description: List of filter names that run in which results are logged but do not affect trajectory feasibility.
    read_only: false

  vehicle_constraint:
    max_speed:
      type: double
      default_value: 16.7
      description: Maximum allowed speed (m/s)
      read_only: false
    max_acceleration:
      type: double
      default_value: 5.0
      description: Maximum allowed acceleration (m/s^2)
      read_only: false
    max_deceleration:
      type: double
      default_value: 5.0
      description: Maximum allowed deceleration (m/s^2, positive but represents deceleration)
      read_only: false
    max_steering_angle:
      type: double
      default_value: 0.8
      description: Maximum allowed steering angle (rad)
      read_only: false
    max_steering_rate:
      type: double
      default_value: 0.3
      description: Maximum allowed steering rate (rad/s)
      read_only: false

  collision_check:
    global_setting:
      time_resolution:
        type: double
        default_value: .NAN
        description: sampling interval used in collision check trajectory generation
        read_only: false
    drac:
      enable_assessment:
        base:
          &drac_ea {
            type: bool,
            default_value: true,
            description: DRAC enable_assessment per class,
            read_only: false,
          }
        unknown: *drac_ea
        car: *drac_ea
        truck: *drac_ea
        bus: *drac_ea
        trailer: *drac_ea
        motorcycle: *drac_ea
        bicycle: *drac_ea
        pedestrian: *drac_ea
        animal: *drac_ea
        hazard: *drac_ea
        over_drivable: *drac_ea
        under_drivable: *drac_ea
      pet_margin:
        ego_earlier:
          type: double
          default_value: .NAN
          description: PET margin when ego reaches the collision point earlier than the object
          read_only: false
        object_earlier:
          type: double
          default_value: .NAN
          description: PET margin when the object reaches the collision point earlier than ego
          read_only: false
      ego_footprint_margin:
        lateral:
          base:
            type: double
            default_value: .NAN
            description: default lateral margin added to both sides of the ego footprint for DRAC assessment
            read_only: false
          unknown:
            &drac_labeled_double_override {
              type: double,
              default_value: .NAN,
              description: Per-class override. NaN uses the base value.,
              read_only: false,
            }
          car: *drac_labeled_double_override
          truck: *drac_labeled_double_override
          bus: *drac_labeled_double_override
          trailer: *drac_labeled_double_override
          motorcycle: *drac_labeled_double_override
          bicycle: *drac_labeled_double_override
          pedestrian: *drac_labeled_double_override
          animal: *drac_labeled_double_override
          hazard: *drac_labeled_double_override
          over_drivable: *drac_labeled_double_override
          under_drivable: *drac_labeled_double_override
        front:
          type: double
          default_value: .NAN
          description: front margin added to the ego footprint for DRAC assessment
          read_only: false
        rear:
          type: double
          default_value: .NAN
          description: rear margin added to the ego footprint for DRAC assessment
          read_only: false
      ego_reaction_braking_delay:
        nominal:
          type: double
          default_value: .NAN
          description: Ego reaction and braking delay used for nominal DRAC assessment
          read_only: false
        departure:
          type: double
          default_value: .NAN
          description: Ego reaction and braking delay used for departure DRAC assessment
          read_only: false
      constant_curvature:
        enable_assessment:
          type: bool
          default_value: true
          description: Use constant curvature trajectories for DRAC assessment
          read_only: false
        object_time_horizon:
          base:
            type: double
            default_value: .NAN
            description: Default time horizon for the object constant curvature trajectory
            read_only: false
          unknown: *drac_labeled_double_override
          car: *drac_labeled_double_override
          truck: *drac_labeled_double_override
          bus: *drac_labeled_double_override
          trailer: *drac_labeled_double_override
          motorcycle: *drac_labeled_double_override
          bicycle: *drac_labeled_double_override
          pedestrian: *drac_labeled_double_override
          animal: *drac_labeled_double_override
          hazard: *drac_labeled_double_override
          over_drivable: *drac_labeled_double_override
          under_drivable: *drac_labeled_double_override
        ego_earlier:
          &drac_assessment {
            enable_assessment:
              {
                type: bool,
                default_value: true,
                description: Enable this DRAC assessment condition,
                read_only: false,
              },
            ego_drac_acceleration:
              {
                safe_limit:
                  {
                    type: double,
                    default_value: .NAN,
                    description: Ego acceleration limit for a safe DRAC assessment,
                    read_only: false,
                  },
                danger_limit:
                  {
                    type: double,
                    default_value: .NAN,
                    description: Ego acceleration limit for a dangerous DRAC assessment,
                    read_only: false,
                  },
                fatal_limit:
                  {
                    type: double,
                    default_value: .NAN,
                    description: Ego acceleration limit for a fatal DRAC assessment,
                    read_only: false,
                  },
                enable_abandon:
                  {
                    type: bool,
                    default_value: false,
                    description: Treat an unavoidable collision as high caution instead of fatal,
                    read_only: false,
                  },
              },
          }
        object_earlier: *drac_assessment
      map_based:
        enable_assessment:
          type: bool
          default_value: false
          description: Use map based predicted path trajectories for DRAC assessment
          read_only: false
        ego_prioritized_ego_earlier: *drac_assessment
        ego_prioritized_object_earlier: *drac_assessment
        object_prioritized_ego_earlier: *drac_assessment
        object_prioritized_object_earlier: *drac_assessment
    rss:
      enable_assessment:
        base:
          &rss_ea {
            type: bool,
            default_value: true,
            description: RSS enable_assessment per class,
            read_only: false,
          }
        unknown: *rss_ea
        car: *rss_ea
        truck: *rss_ea
        bus: *rss_ea
        trailer: *rss_ea
        motorcycle: *rss_ea
        bicycle: *rss_ea
        pedestrian: *rss_ea
        animal: *rss_ea
        hazard: *rss_ea
        over_drivable: *rss_ea
        under_drivable: *rss_ea
      stop_distance_margin:
        type: double
        default_value: .NAN
        description: required remaining distance to the object when ego stops
        read_only: false
      ego_total_braking_delay:
        type: double
        default_value: .NAN
        description: Total ego braking delay for RSS calculation
        read_only: false
      ego_footprint_margin:
        lateral:
          type: double
          default_value: .NAN
          description: lateral margin added to both sides of the ego footprint for RSS assessment
          read_only: false
        front:
          type: double
          default_value: .NAN
          description: front margin added to the ego footprint for RSS assessment
          read_only: false
        rear:
          type: double
          default_value: .NAN
          description: rear margin added to the ego footprint for RSS assessment
          read_only: false
      object_assumed_acceleration:
        type: double
        default_value: .NAN
        description: Assumed object acceleration for RSS calculation (m/s^2, negative)
        read_only: false
      error_threshold:
        ego_acceleration:
          type: double
          default_value: .NAN
          description: Ego acceleration threshold to determine RSS collision (m/s^2, negative)
          read_only: false

  traffic_light:
    deceleration_limit:
      type: double
      default_value: 2.8
      description: trajectories crossing an amber light are rejected if ego can stop at the stop line without breaking this limit
      read_only: false
    jerk_limit:
      type: double
      default_value: 5.0
      description: trajectories crossing an amber light are rejected if ego can stop at the stop line without breaking this limit
      read_only: false
    delay_response_time:
      type: double
      default_value: 0.5
      description: delay response time used to estimate the minimum ego stopping distance
      read_only: false
    crossing_time_limit:
      type: double
      default_value: 2.75
      description: trajectories crossing an amber light are rejected if they cannot cross before this time
      read_only: false
    treat_amber_light_as_red_light:
      type: bool
      default_value: true
      description: when true, amber lights are handled like red lights
      read_only: false
    treat_unknown_light_as_red_light:
      type: bool
      default_value: false
      description: when true, unknown lights are handled like red lights
      read_only: false
    stop_overshoot_margin:
      type: double
      default_value: 0.5
      description: Maximum distance between the stop line and the trajectory stop point to consider the trajectory feasible (m)
      read_only: false
    stable_duration_threshold_red:
      type: double
      default_value: 0.0
      description: Stability duration for RED signals (seconds)
      read_only: false
    stable_duration_threshold_amber:
      type: double
      default_value: 0.0
      description: Stability duration for AMBER signals (seconds)
      read_only: false
    stable_duration_threshold_unknown:
      type: double
      default_value: 0.0
      description: Minimum duration an UNKNOWN signal must be seen before it is considered active (seconds)
      read_only: false
    amber_rejection_hysteresis_duration:
      type: double
      default_value: 0.0
      description: Hysteresis duration to persist an AMBER rejection (seconds)
      read_only: false
    ego_stopped_velocity_threshold:
      type: double
      default_value: 0.01
      description: Velocity below which ego is considered fully stopped (m/s)
      read_only: false
    checked_trajectory_length:
      deceleration_limit:
        type: double
        default_value: 2.0
        description: deceleration limit to calculate the stop distance used as trajectory length limit
        read_only: false
      jerk_limit:
        type: double
        default_value: 2.0
        description: jerk limit to calculate the stop distance used as trajectory length limit
        read_only: false

  boundary_departure:
    lateral_margin_m:
      type: double
      default_value: 0.01
      description: lateral margin [m]
      read_only: false
    longitudinal_margin_m:
      type: double
      default_value: 1.0
      description: longitudinal margin [m]
      read_only: false
    max_deceleration_mps2:
      type: double
      default_value: -4.0
      description: maximum deceleration [m/s^2]
      read_only: false
    max_jerk_mps3:
      type: double
      default_value: -5.0
      description: maximum jerk [m/s^3]
      read_only: false
    brake_delay_s:
      type: double
      default_value: 1.0
      description: brake delay [s]
      read_only: false
    time_to_departure_cutoff_s:
      type: double
      default_value: 2.0
      description: time to departure cutoff [s]
      read_only: false
    on_time_buffer_s:
      type: double
      default_value: 0.15
      description: buffer for activating departure detection [s]
      read_only: false
    off_time_buffer_s:
      type: double
      default_value: 0.15
      description: buffer for deactivating departure detection [s]
      read_only: false
    enable_developer_marker:
      type: bool
      default_value: true
      description: flag marker only for developer
      read_only: false
    boundary_types:
      type: string_array
      default_value: [road_border]
      description: boundary types to detect
      read_only: true

  pseudo_emergency_stop:
    enable:
      type: bool
      default_value: false
      description: When true, the emergency-stop fallback is active. When false, all emergency-stop handling is skipped. Evaluation use only.
      read_only: false
    deceleration_mps2:
      type: double
      default_value: -6.0
      description: Target longitudinal deceleration (m/s^2, negative) used to build the emergency-stop velocity profile. Evaluation use only.
      read_only: false
    jerk_mps3:
      type: double
      default_value: -20.0
      description: Longitudinal jerk (m/s^3, negative) used to ramp the deceleration when building the emergency-stop velocity profile. Evaluation use only.
      read_only: false
    recovery_policy:
      type: string
      default_value: until_stopped
      description: Recovery policy after the emergency-stop is triggered. until_stopped keeps decelerating until the ego velocity falls below recovery_velocity_threshold_mps. immediate releases the deceleration as soon as the trigger condition disappears. Evaluation use only.
      read_only: false
    recovery_velocity_threshold_mps:
      type: double
      default_value: 0.1
      description: Ego velocity threshold (m/s) under which the latched emergency-stop state is released when recovery_policy is until_stopped. Evaluation use only.
      read_only: false
