trajectory_validator_diagnostic:
  configured_actions:
    type: string_array
    default_value:
      - uncrossable_boundary_departure_filter:moderate:trajectory_validator_uncrossable_boundary_departure_danger
    description: >-
      Each entry defines one configured_action encoded as
      filter_name:action:diagnostic_name, where filter_name is the filter short name
      (from plugin->get_name()), action is one of none/comfortable/moderate/emergency, and
      diagnostic_name is the status name to publish when the action fires.
    read_only: true
  no_candidates_diag_status_name:
    type: string
    default_value: trajectory_validator_no_candidate_trajectory
    description: >-
      Diagnostic status name published at ERROR when no candidate trajectory is available.
      Set to an empty string to disable this status.
    read_only: true
