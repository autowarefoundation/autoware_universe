/**:
  ros__parameters:
    filter_names:
      [""]

    shadow_mode_filter_names:
      [
        "safety::UncrossableBoundaryDepartureFilter",
        "safety::VehicleConstraintFilter",
        "traffic_rule::TrafficLightFilter",
      ]

    collision_check:
      global_setting:
        time_resolution: 0.1
      drac:
        enable_assessment:
          # default value is true.
          unknown: false
          animal: false
          hazard: false
          over_drivable: false
          under_drivable: false
        pet_margin:
          ego_earlier: 0.6
          object_earlier: 1.0
        ego_footprint_margin:
          lateral:
            base: 0.3
            pedestrian: 0.5
            bicycle: 0.5
          front: 1.0
          rear: 0.0
        ego_reaction_braking_delay:
          nominal: 0.5
          departure: 1.0
        constant_curvature:
          enable_assessment: true
          object_time_horizon:
            base: 1.0
            pedestrian: 1.5
            bicycle: 1.5
          ego_earlier:
            enable_assessment: false # Not evaluated. Must be false
          object_earlier:
            enable_assessment: true
            ego_drac_acceleration:
              safe_limit: -1.5
              danger_limit: -3.0
              fatal_limit: -6.0
              enable_abandon: false
        map_based:
          enable_assessment: true
          ego_prioritized_ego_earlier:
            enable_assessment: false # Not evaluated. Must be false
          ego_prioritized_object_earlier:
            enable_assessment: false # Not evaluated. Must be false
          object_prioritized_ego_earlier:
            enable_assessment: true
            ego_drac_acceleration:
              safe_limit: -1.5
              danger_limit: -3.0
              fatal_limit: -6.0
              enable_abandon: true
          object_prioritized_object_earlier:
            enable_assessment: true
            ego_drac_acceleration:
              safe_limit: -1.5
              danger_limit: -3.0
              fatal_limit: -6.0
              enable_abandon: false
      rss:
        enable_assessment:
          # default value is true.
          unknown: false
          animal: false
          hazard: false
          over_drivable: false
          under_drivable: false
        stop_distance_margin: 2.0
        ego_total_braking_delay: 0.4
        ego_footprint_margin:
          lateral: 0.0
          front: 0.0
          rear: 0.0
        object_assumed_acceleration: -4.0
        error_threshold:
          ego_acceleration: -4.0

    vehicle_constraint:
      max_speed: 16.7 # m/s
      max_acceleration: 5.0 # m/s^2
      max_deceleration: 5.0 # m/s^2 (positive but represents deceleration)
      max_steering_angle: 0.8 # rad
      max_steering_rate: 0.3 # rad/s

    traffic_light:
      deceleration_limit: 2.8  # [m/s^2] trajectories crossing an amber light are rejected if ego can stop at the stop line without breaking this limit
      jerk_limit: 5.0  # [m/s^3] trajectories crossing an amber light are rejected if ego can stop at the stop line without breaking this limit
      delay_response_time: 0.5 # [s] delay response time used to estimate the minimum ego stopping distance
      crossing_time_limit: 2.75 # [s] trajectories crossing an amber light are rejected if they cannot cross before this time
      treat_amber_light_as_red_light: true # [-] when true, amber lights are handled like red lights
      treat_unknown_light_as_red_light: false # [-] when true, unknown lights are handled like red lights
      stop_overshoot_margin: 0.5 # [m] maximum distance between the stop line and the trajectory stop point to consider the trajectory feasible
      allow_if_cannot_stop_distance: 0.0 # [m] allow crossing a stop line within this distance if ego cannot stop before the line plus its margin
      stable_duration_threshold_red: 0.0 # [s] minimum duration a red light must be seen before it is considered active
      stable_duration_threshold_amber: 0.0 # [s] minimum duration an amber light must be seen before it is considered active
      stable_duration_threshold_unknown: 0.0 # [s] minimum duration an unknown light must be seen before it is considered active
      amber_rejection_hysteresis_duration: 0.0 # [s] duration to persist an amber rejection
      ego_stopped_velocity_threshold: 0.01 # [m/s] velocity below which ego is considered fully stopped
      checked_trajectory_length:  # maximum length of the planned trajectory that is scanned for traffic light stop lines.
        deceleration_limit: 2.0  # [m/s^2] deceleration limit to calculate the stop distance used as trajectory length limit
        jerk_limit: 2.0  # [m/s^3] jerk limit to calculate the stop distance used as trajectory length limit

    boundary_departure:
      boundary_types: ["road_border"]
      brake_delay_s: 1.0
      enable_developer_marker: false
      lateral_margin_m: 0.01
      longitudinal_margin_m: 1.0
      max_deceleration_mps2: -4.0
      max_jerk_mps3: -5.0
      off_time_buffer_s: 0.10
      on_time_buffer_s: 0.20
      time_to_departure_cutoff_s: 2.0
